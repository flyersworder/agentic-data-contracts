version: "1.0"
name: revenue-analysis

semantic:
  source:
    type: yaml
    path: "./semantic.yml"
  allowed_tables:
    - schema: analytics
      description: "Curated analytics tables — prefer these for all reporting queries"
      preferred: true
      tables: [orders, customers, subscriptions]
  forbidden_operations: [DELETE, DROP, TRUNCATE, UPDATE, INSERT]
  domains:
    - name: revenue
      summary: "Financial metrics from completed orders"
      description: >
        Revenue metrics track recognized revenue from completed orders.
        Revenue is recognized at fulfillment, not at booking.
        Excludes refunds, chargebacks, and pending orders unless stated.
      metrics: [total_revenue, revenue_by_region, active_customers]
      tables: [analytics.orders, analytics.customers]
  rules:
    - name: tenant_isolation
      description: "All queries must filter by tenant_id"
      enforcement: block
      query_check:
        required_filter: tenant_id
    # Per-principal value allowlist on the customer_id column. Each external
    # partner may only query their own customers; principals not in the map
    # fall through (the rule does not apply to them — internal analysts use
    # tenant_isolation above instead). This is the value-bound counterpart
    # to required_filter: column-presence is not enough, the *values* must
    # also match.
    #
    # NOTE: Per-value rules deliberately omit `table:` so they apply
    # everywhere `customer_id` appears — joins, subqueries, and the
    # customers table itself. Scoping such a rule to a single table would
    # let a partner bypass it by querying a different table that exposes
    # the same column.
    - name: partner_customer_scope
      description: >
        External partners may only query customers in their own accounts.
        Each partner sees a different allowlist; values are matched against
        the literal in the WHERE clause (=, IN). Subqueries and ranges are
        rejected since they cannot be statically proven.
      enforcement: block
      query_check:
        required_filter_values:
          column: customer_id
          values_by_principal:
            partner-a@external.com: [101, 102, 103]
            partner-b@external.com: [201, 202]
    - name: use_semantic_revenue
      description: "Revenue calculations must use the metric definitions"
      enforcement: warn
    - name: no_select_star
      description: "Must specify explicit columns"
      enforcement: block
      query_check:
        no_select_star: true

resources:
  cost_limit_usd: 5.00
  max_retries: 3
  token_budget: 50000

temporal:
  max_duration_seconds: 300
