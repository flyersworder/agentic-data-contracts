# Semantic source — define only what the database can't tell the agent.
# Table columns are discovered at runtime via the describe_table tool.

metrics:
  - name: total_revenue
    description: "Total revenue from completed orders"
    sql_expression: "SUM(amount) FILTER (WHERE status = 'completed')"
    source_model: analytics.orders
    filters:
      - "status = 'completed'"
    domains: [revenue]
    tier: [north_star, department_kpi]
    indicator_kind: lagging

  - name: revenue_by_region
    description: "Revenue broken down by customer region"
    sql_expression: "SUM(o.amount) GROUP BY c.region"
    source_model: analytics.orders
    filters:
      - "o.status = 'completed'"
    domains: [revenue]
    tier: [team_kpi]
    indicator_kind: lagging

  - name: active_customers
    description: "Distinct customers with at least one order in the period"
    sql_expression: "COUNT(DISTINCT customer_id) FILTER (WHERE status = 'completed')"
    source_model: analytics.orders
    domains: [revenue]
    tier: [team_kpi]
    indicator_kind: leading

relationships:
  - from: analytics.orders.customer_id
    to: analytics.customers.id
    type: many_to_one
    description: >
      Join orders to customers for region-level breakdowns.
      Every order has exactly one customer.
    required_filter: "status != 'cancelled'"

  - from: analytics.subscriptions.customer_id
    to: analytics.customers.id
    type: many_to_one
    description: >
      Join subscriptions to customers.
      Each subscription belongs to one customer.

metric_impacts:
  - from: active_customers
    to: total_revenue
    direction: positive
    confidence: hypothesized
    evidence: "Directional hypothesis — not yet backed by an A/B test"
    description: "More distinct active customers in a period typically lifts total revenue."
    last_reviewed: 2026-04-18  # bump when you re-verify the causal claim
