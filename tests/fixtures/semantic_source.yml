metrics:
  - name: total_revenue
    description: "Total revenue from completed orders"
    sql_expression: "SUM(amount) FILTER (WHERE status = 'completed')"
    source_model: analytics.orders
    filters:
      - "status = 'completed'"
    domains: [revenue]
    tier: [north_star, department_kpi]
    indicator_kind: lagging
    # Owners are teams, not individuals. business_owner owns the definition +
    # review cadence; operational_owner owns data health (DQ, backfills).
    business_owner: revenue-platform
    operational_owner: data-eng-finance
    # Deliberately old so staleness is deterministic against the real clock.
    last_reviewed: 2020-01-01

  # active_customers intentionally omits owners + last_reviewed — exercises the
  # "field absent" path in the staleness detector and the agent-facing tools.
  - name: active_customers
    description: "Count of customers with at least one order in the last 90 days"
    sql_expression: "COUNT(DISTINCT customer_id)"
    source_model: analytics.customers
    filters:
      - "last_order_date >= CURRENT_DATE - INTERVAL '90 days'"
    domains: [engagement, revenue]
    tier: [team_kpi]
    indicator_kind: leading

tables:
  - schema: analytics
    table: orders
    columns:
      - name: id
        type: INTEGER
        description: "Primary key"
      - name: amount
        type: DECIMAL
        description: "Order total in USD"
      - name: tenant_id
        type: VARCHAR
        description: "Tenant identifier for multi-tenancy"
      - name: status
        type: VARCHAR
        description: "Order status: pending, completed, cancelled"
      - name: customer_id
        type: INTEGER
        description: "FK to customers"

  - schema: analytics
    table: customers
    columns:
      - name: id
        type: INTEGER
        description: "Primary key"
      - name: name
        type: VARCHAR
        description: "Customer name"
      - name: region
        type: VARCHAR
        description: "Geographic region"

relationships:
  - from: analytics.orders.customer_id
    to: analytics.customers.id
    type: many_to_one
    description: >
      Each order belongs to exactly one customer.
      Use this join for customer-level aggregations.

metric_impacts:
  - from: active_customers
    to: total_revenue
    direction: positive
    confidence: verified
    evidence: "A/B test exp-042 (Q3 2025), +3.2% revenue lift, p<0.01"
    description: "Retained customers drive repeat purchases."
